# .github/workflows/deploy.yml — Pipeline CI/CD completo AVENGERS
#
# Secrets requeridos en GitHub → Settings → Secrets:
#   RAILWAY_TOKEN : Token de autenticación para Railway CLI
#   VERCEL_TOKEN  : Token de autenticación para Vercel CLI
#   DEPLOY_URL    : URL base del backend desplegado (ej: https://avengers-api.railway.app)

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy .

      - name: Tests with coverage
        run: pytest tests/ --cov=. --cov-fail-under=80

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: quality-gate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy backend → Railway
        run: railway up --service avengers-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy frontend → Vercel
        run: vercel --prod --token ${{ secrets.VERCEL_TOKEN }}

      - name: Health check
        id: health
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.DEPLOY_URL }}/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed (status=$STATUS). Retrying in ${i}s..."
            sleep $i
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Rollback on failure
        if: failure() && steps.health.outcome == 'failure'
        run: |
          echo "::error::Health check failed — triggering rollback"
          railway rollback --service avengers-api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
